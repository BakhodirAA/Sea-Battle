<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Морской бой</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 10px;
      font-family: Arial, sans-serif;
      background: #e0f7fa;
      color: #01579b;
    }
    h1 { text-align: center; margin: 10px 0; font-size: 1.6em; }
    #status {
      text-align: center;
      font-size: 1.2em;
      margin: 8px 0;
      min-height: 1.6em;
      font-weight: bold;
    }
    #game {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }
    .board-container { text-align: center; }
    .board-label { font-weight: bold; margin-bottom: 4px; font-size: 1em; }
    canvas {
      border: 2px solid #0288d1;
      border-radius: 6px;
      background: #81d4fa;
      display: block;
      cursor: crosshair;
    }
    button {
      display: block;
      margin: 12px auto;
      padding: 12px 28px;
      font-size: 1.1em;
      background: #0288d1;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #0277bd; }
  </style>
</head>
<body>
  <h1>Морской бой</h1>
  <div id="status">Нажмите «Новая игра»</div>

  <div id="game">
    <div class="board-container">
      <div class="board-label">Твоё поле</div>
      <canvas id="playerCanvas"></canvas>
    </div>
    <div class="board-container">
      <div class="board-label">Поле противника</div>
      <canvas id="enemyCanvas"></canvas>
    </div>
  </div>

  <button id="newGame">Новая игра</button>

  <script>
    const SIZE = 10;
    const SHIPS = [4, 3, 3, 2, 2, 2, 1, 1, 1, 1];

    const playerCanvas = document.getElementById('playerCanvas');
    const enemyCanvas  = document.getElementById('enemyCanvas');
    const pCtx = playerCanvas.getContext('2d');
    const eCtx = enemyCanvas.getContext('2d');
    const statusEl = document.getElementById('status');

    let CELL = 36;
    let playerBoard, enemyBoard, shots;
    let gameActive = false;

    function calcCell() {
      const w = Math.min(window.innerWidth - 40, 400);
      CELL = Math.max(24, Math.floor(w / SIZE));
    }

    function setCanvasSizes() {
      calcCell();
      const px = SIZE * CELL;
      playerCanvas.width  = px; playerCanvas.height = px;
      enemyCanvas.width   = px; enemyCanvas.height  = px;
    }

    function makeBoard() {
      return Array.from({length: SIZE}, () => new Array(SIZE).fill(0));
    }

    function placeShips(board) {
      for (const len of SHIPS) {
        let placed = false, tries = 0;
        while (!placed && tries++ < 10000) {
          const hor = Math.random() > 0.5;
          const r = Math.floor(Math.random() * (hor ? SIZE : SIZE - len + 1));
          const c = Math.floor(Math.random() * (hor ? SIZE - len + 1 : SIZE));
          if (r >= SIZE || c >= SIZE) continue;
          let ok = true;
          const cells = [];
          for (let i = 0; i < len; i++) {
            const rr = hor ? r : r + i, cc = hor ? c + i : c;
            if (rr >= SIZE || cc >= SIZE) { ok = false; break; }
            cells.push([rr, cc]);
            for (let dr = -1; dr <= 1; dr++)
              for (let dc = -1; dc <= 1; dc++) {
                const nr = rr+dr, nc = cc+dc;
                if (nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && board[nr][nc]===1) ok=false;
              }
            if (!ok) break;
          }
          if (ok) { cells.forEach(([rr,cc]) => board[rr][cc]=1); placed=true; }
        }
      }
    }

    function drawBoard(ctx, board, hide) {
      const s = CELL;
      ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const x = c*s, y = r*s, v = board[r][c];
          ctx.fillStyle = (r+c)%2===0 ? '#b3e5fc' : '#81d4fa';
          ctx.fillRect(x,y,s,s);
          if (v===1 && !hide) {
            ctx.fillStyle = '#37474f';
            ctx.fillRect(x+3, y+3, s-6, s-6);
          }
          if (v===2) {
            ctx.fillStyle = '#c62828';
            ctx.fillRect(x+3,y+3,s-6,s-6);
            ctx.strokeStyle='#fff'; ctx.lineWidth=2;
            ctx.beginPath();
            ctx.moveTo(x+6,y+6); ctx.lineTo(x+s-6,y+s-6);
            ctx.moveTo(x+s-6,y+6); ctx.lineTo(x+6,y+s-6);
            ctx.stroke();
          }
          if (v===3) {
            ctx.fillStyle='#111';
            ctx.beginPath();
            ctx.arc(x+s/2, y+s/2, s/4, 0, Math.PI*2);
            ctx.fill();
          }
          ctx.strokeStyle='#0277bd'; ctx.lineWidth=0.5;
          ctx.strokeRect(x,y,s,s);
        }
      }
    }

    function drawBoards() {
      if (!playerBoard) return;
      drawBoard(pCtx, playerBoard, false);
      drawBoard(eCtx, shots, true);
    }

    function startGame() {
      setCanvasSizes();
      playerBoard = makeBoard();
      enemyBoard  = makeBoard();
      shots       = makeBoard();
      placeShips(playerBoard);
      placeShips(enemyBoard);
      gameActive = true;
      statusEl.textContent = 'Твой ход — кликни по полю противника';
      drawBoards();
    }

    function getCell(e, canvas) {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      const col = Math.floor((cx - rect.left) * sx / CELL);
      const row = Math.floor((cy - rect.top)  * sy / CELL);
      if (row<0||row>=SIZE||col<0||col>=SIZE) return null;
      return {row, col};
    }

    // Проверка: потоплен ли корабль
    function isShipSunk(board, r, c) {
      const visited = new Set();
      const stack = [[r, c]];
      const ship = [];

      while (stack.length) {
        const [cr, cc] = stack.pop();
        const key = cr * SIZE + cc;
        if (visited.has(key)) continue;
        visited.add(key);
        const v = board[cr][cc];
        if (v !== 1 && v !== 2) continue;
        ship.push([cr, cc]);
        for (const [dr, dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
          const nr = cr+dr, nc = cc+dc;
          if (nr>=0 && nr<SIZE && nc>=0 && nc<SIZE) stack.push([nr, nc]);
        }
      }
      return ship.length > 0 && ship.every(([sr, sc]) => board[sr][sc] === 2);
    }

    // Автоматическая обводка потопленного корабля промахами
    function autoOutline(board, targetBoard, r, c) {
      const visited = new Set();
      const stack = [[r, c]];
      const ship = [];

      while (stack.length) {
        const [cr, cc] = stack.pop();
        const key = cr * SIZE + cc;
        if (visited.has(key)) continue;
        visited.add(key);
        const v = board[cr][cc];
        if (v !== 1 && v !== 2) continue;
        ship.push([cr, cc]);
        for (const [dr, dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
          const nr = cr+dr, nc = cc+dc;
          if (nr>=0 && nr<SIZE && nc>=0 && nc<SIZE) stack.push([nr, nc]);
        }
      }

      for (const [sr, sc] of ship) {
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            const nr = sr + dr, nc = sc + dc;
            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
               if (targetBoard[nr][nc] === 0) {
                 targetBoard[nr][nc] = 3;
                 // Обновляем доску игрока для компьютера, чтобы он туда тоже не стрелял
                 if (board === playerBoard) playerBoard[nr][nc] = 3;
               }
            }
          }
        }
      }
    }

    function playerShoot(e) {
      if (!gameActive) return;
      e.preventDefault();
      const cell = getCell(e, enemyCanvas);
      if (!cell) return;
      const {row, col} = cell;
      if (shots[row][col] !== 0) return;
      soundShoot();

      if (enemyBoard[row][col] === 1) {
        shots[row][col] = 2;
        enemyBoard[row][col] = 2;
        statusEl.textContent = 'Попадание!';
        soundHit();
        
        if (isShipSunk(enemyBoard, row, col)) {
          autoOutline(enemyBoard, shots, row, col);
        }
      } else {
        shots[row][col] = 3;
        statusEl.textContent = 'Мимо...';
        soundMiss();
      }
      drawBoards();

      // Проверка на победу без метода flat() для старых браузеров
      if (enemyBoard.every(row => row.every(v => v !== 1))) {
        statusEl.textContent = 'ПОБЕДА! Все корабли потоплены!';
        soundVictory();
        gameActive = false;
        return;
      }
      gameActive = false;
      setTimeout(computerMove, 700);
    }

    function computerMove() {
      let r = -1, c = -1;
      let unsunkHits = [];

      // 1. Ищем все попадания по непотопленным кораблям
      for (let i = 0; i < SIZE; i++) {
        for (let j = 0; j < SIZE; j++) {
          if (playerBoard[i][j] === 2 && !isShipSunk(playerBoard, i, j)) {
            unsunkHits.push({r: i, c: j});
          }
        }
      }

      let potentialTargets = [];
      if (unsunkHits.length > 0) {
        if (unsunkHits.length > 1) {
          let isHor = unsunkHits.every(h => h.r === unsunkHits[0].r);
          let isVer = unsunkHits.every(h => h.c === unsunkHits[0].c);

          if (isHor) {
            let row = unsunkHits[0].r;
            let minC = Math.min(...unsunkHits.map(h => h.c));
            let maxC = Math.max(...unsunkHits.map(h => h.c));
            if (minC > 0) potentialTargets.push({r: row, c: minC - 1});
            if (maxC < SIZE - 1) potentialTargets.push({r: row, c: maxC + 1});
          } else if (isVer) {
            let col = unsunkHits[0].c;
            let minR = Math.min(...unsunkHits.map(h => h.r));
            let maxR = Math.max(...unsunkHits.map(h => h.r));
            if (minR > 0) potentialTargets.push({r: minR - 1, c: col});
            if (maxR < SIZE - 1) potentialTargets.push({r: maxR + 1, c: col});
          }
        }

        if (potentialTargets.length === 0) {
          const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
          for (let hit of unsunkHits) {
            for (let [dr, dc] of dirs) {
              let nr = hit.r + dr, nc = hit.c + dc;
              if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                potentialTargets.push({r: nr, c: nc});
              }
            }
          }
        }

        potentialTargets = potentialTargets.filter(p => playerBoard[p.r][p.c] !== 2 && playerBoard[p.r][p.c] !== 3);

        if (potentialTargets.length > 0) {
          const target = potentialTargets[Math.floor(Math.random() * potentialTargets.length)];
          r = target.r;
          c = target.c;
        }
      }

      // 2. Случайный выстрел, если целей нет
      if (r === -1 || c === -1) {
        let tries = 0;
        do {
          r = Math.floor(Math.random() * SIZE);
          c = Math.floor(Math.random() * SIZE);
        } while ((playerBoard[r][c] === 2 || playerBoard[r][c] === 3) && tries++ < 1000);
      }

      if (playerBoard[r][c]===1) {
        playerBoard[r][c]=2;
        statusEl.textContent = `Компьютер попал в ${String.fromCharCode(65+c)}${r+1}!`;
        soundHit();
        
        if (isShipSunk(playerBoard, r, c)) {
          autoOutline(playerBoard, playerBoard, r, c);
        }
      } else {
        playerBoard[r][c]=3;
        statusEl.textContent = 'Компьютер промахнулся. Твой ход!';
        soundMiss();
      }
      drawBoards();

      if (playerBoard.every(row => row.every(v => v !== 1))) {
        statusEl.textContent = 'Поражение... Компьютер победил';
        soundDefeat();
        return;
      }
      gameActive = true;
    }

    enemyCanvas.addEventListener('click', playerShoot);
    enemyCanvas.addEventListener('touchstart', playerShoot, {passive: false});
    document.getElementById('newGame').addEventListener('click', () => { soundClick(); startGame(); });
    window.addEventListener('resize', () => { if(playerBoard){ setCanvasSizes(); drawBoards(); } });

    startGame();

    // ====== БЕЗОПАСНЫЙ ЗВУК ======
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) {
        const AudioCtxCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtxCtor) return null; // Если браузер совсем без звука
        try {
          audioCtx = new AudioCtxCtor({ sampleRate: 48000 });
        } catch (e) {
          audioCtx = new AudioCtxCtor(); // Запасной вариант для Safari
        }
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function makeBuf(ac, dur, fn) {
      if (!ac) return null;
      const sr = ac.sampleRate;
      const len = Math.floor(sr * dur);
      const buf = ac.createBuffer(1, len, sr);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = fn(i, sr, len);
      return buf;
    }

    function playBuf(ac, buf, t, vol, filterType, filterFreq, filterQ = 1) {
      if (!ac || !buf) return;
      const src = ac.createBufferSource();
      src.buffer = buf;
      const g = ac.createGain();
      g.gain.setValueAtTime(vol, t);
      if (filterType) {
        const f = ac.createBiquadFilter();
        f.type = filterType;
        f.frequency.value = filterFreq;
        if (filterQ !== 1) f.Q.value = filterQ;
        src.connect(f); f.connect(g);
      } else {
        src.connect(g);
      }
      g.connect(ac.destination);
      src.start(t);
    }

    function blSquare(phase, harmonics = 16) {
      let v = 0;
      for (let k = 0; k < harmonics; k++) {
        const n = 2 * k + 1;
        v += Math.sin(n * 2 * Math.PI * phase) / n;
      }
      return v * (4 / Math.PI);
    }

    function env(progress, attack, release) {
      if (progress < attack) return progress / attack;
      if (progress > 1 - release) return (1 - progress) / release;
      return 1.0;
    }

    function relayClick(ac, t, vol = 0.5) {
      const buf = makeBuf(ac, 0.018, (i, sr, len) => {
        const p = i / len;
        const attack = p < 0.08 ? p / 0.08 : Math.exp(-18 * (p - 0.08));
        const tone = Math.sin(2 * Math.PI * 1800 * i / sr) * 0.3
                   + Math.sin(2 * Math.PI * 3200 * i / sr) * 0.1;
        return attack * (0.7 + tone);
      });
      playBuf(ac, buf, t, vol, 'highpass', 400);
    }

    function buzzer(ac, t, dur, freq, vol) {
      const buf = makeBuf(ac, dur, (i, sr, len) => {
        const p = i / len;
        const phase = (i * freq / sr) % 1.0;
        const raw = blSquare(phase, 12);
        const wobble = 1.0 + 0.06 * Math.sin(2 * Math.PI * 5.7 * i / sr);
        const e = env(p, 0.015, 0.025);
        return raw * wobble * e * 0.9;
      });
      playBuf(ac, buf, t, vol, 'lowpass', 2400);
    }

    function soundShoot() {
      const ac = getAudio();
      if (!ac) return;
      const t = ac.currentTime;
      relayClick(ac, t, 0.75);

      const buf = makeBuf(ac, 0.18, (i, sr, len) => {
        const p = i / len;
        const freq = 62 * Math.exp(-2.5 * p); 
        const phase = i * freq / sr % 1.0;
        const raw = blSquare(phase, 8);
        const e = p < 0.03 ? p / 0.03 : Math.exp(-5 * (p - 0.03));
        return raw * e;
      });
      playBuf(ac, buf, t + 0.012, 0.45, 'lowpass', 320);
      relayClick(ac, t + 0.10, 0.28);
    }

    function soundHit() {
      const ac = getAudio();
      if (!ac) return;
      const t = ac.currentTime;
      relayClick(ac, t, 1.0);

      const buf = makeBuf(ac, 0.95, (i, sr, len) => {
        const p = i / len;
        const freq = 115 * Math.exp(-Math.log(115 / 45) * p); 
        const phase = i * freq / sr % 1.0;
        const raw = blSquare(phase, 10);
        const e = p < 0.04 ? p / 0.04 : Math.pow(1 - (p - 0.04) / 0.96, 1.1);
        const noise = (Math.random() * 2 - 1) * 0.12 * e;
        return raw * e + noise;
      });
      playBuf(ac, buf, t + 0.006, 1.15, 'lowpass', 750);
      relayClick(ac, t + 0.93, 0.38);
    }

    function soundMiss() {
      const ac = getAudio();
      if (!ac) return;
      const t = ac.currentTime;
      relayClick(ac, t, 0.32);
      buzzer(ac, t + 0.016, 0.038, 82, 0.10);
    }

    function soundVictory() {
      const ac = getAudio();
      if (!ac) return;
      const t = ac.currentTime;

      const buf = makeBuf(ac, 2.3, (i, sr, len) => {
        const sec = i / sr;
        const p = i / len;
        const carrier = blSquare((i * 480 / sr) % 1.0, 14);
        const mod = Math.max(0.0, Math.sin(2 * Math.PI * 8.2 * sec));
        const sigmoid = (x, k) => 1 / (1 + Math.exp(-k * x));
        let gate = 0;
        gate += sigmoid(sec - 0.0, 80) * sigmoid(0.18 - sec, 80);
        gate += sigmoid(sec - 0.28, 80) * sigmoid(0.46 - sec, 80);
        gate += sigmoid(sec - 0.56, 80) * sigmoid(0.74 - sec, 80);
        if (sec >= 0.90) {
          const tp = (sec - 0.90) / 1.4;
          gate += (1 - tp) * Math.max(0, 1 - tp);
        }
        gate = Math.min(gate, 1.0);
        return carrier * mod * gate;
      });
      playBuf(ac, buf, t, 0.88, 'bandpass', 520, 0.65);
      [0, 0.28, 0.56, 0.90].forEach(dt => relayClick(ac, t + dt, 0.48));
    }

    function soundDefeat() {
      const ac = getAudio();
      if (!ac) return;
      const t = ac.currentTime;
      relayClick(ac, t, 0.6);

      const buf = makeBuf(ac, 1.5, (i, sr, len) => {
        const p = i / len;
        const freq = 95 * Math.exp(-Math.log(95 / 4) * p);
        const phase = i * freq / sr % 1.0;
        const raw = blSquare(phase, Math.max(2, Math.floor(12 * (1 - p))));
        const e = Math.pow(1 - p, 0.65);
        return raw * e;
      });
      playBuf(ac, buf, t + 0.01, 0.68, 'lowpass', 580);
    }

    function soundClick() {
      const ac = getAudio();
      if (!ac) return;
      const t = ac.currentTime;
      relayClick(ac, t, 0.62);
      relayClick(ac, t + 0.075, 0.42);
      buzzer(ac, t + 0.13, 0.065, 195, 0.28);
    }
  </script>
</body>
</html>
