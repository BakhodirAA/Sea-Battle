<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Морской бой</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 10px;
      font-family: Arial, sans-serif;
      background: #e0f7fa;
      color: #01579b;
    }
    h1 { text-align: center; margin: 10px 0; font-size: 1.6em; }
    #status {
      text-align: center;
      font-size: 1.2em;
      margin: 8px 0;
      min-height: 1.6em;
      font-weight: bold;
    }
    #game {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }
    .board-container { text-align: center; }
    .board-label { font-weight: bold; margin-bottom: 4px; font-size: 1em; }
    canvas {
      border: 2px solid #0288d1;
      border-radius: 6px;
      background: #81d4fa;
      display: block;
      cursor: crosshair;
    }
    button {
      display: block;
      margin: 12px auto;
      padding: 12px 28px;
      font-size: 1.1em;
      background: #0288d1;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #0277bd; }
  </style>
</head>
<body>
  <h1>Морской бой</h1>
  <div id="status">Нажмите «Новая игра»</div>

  <div id="game">
    <div class="board-container">
      <div class="board-label">Твоё поле</div>
      <canvas id="playerCanvas"></canvas>
    </div>
    <div class="board-container">
      <div class="board-label">Поле противника</div>
      <canvas id="enemyCanvas"></canvas>
    </div>
  </div>

  <button id="newGame">Новая игра</button>

  <script>
    const SIZE = 10;
    const SHIPS = [4, 3, 3, 2, 2, 2, 1, 1, 1, 1];

    const playerCanvas = document.getElementById('playerCanvas');
    const enemyCanvas  = document.getElementById('enemyCanvas');
    const pCtx = playerCanvas.getContext('2d');
    const eCtx = enemyCanvas.getContext('2d');
    const statusEl = document.getElementById('status');

    let CELL = 36;
    let playerBoard, enemyBoard, shots;
    let gameActive = false;

    function calcCell() {
      const w = Math.min(window.innerWidth - 40, 400);
      CELL = Math.max(24, Math.floor(w / SIZE));
    }

    function setCanvasSizes() {
      calcCell();
      const px = SIZE * CELL;
      playerCanvas.width  = px; playerCanvas.height = px;
      enemyCanvas.width   = px; enemyCanvas.height  = px;
    }

    function makeBoard() {
      return Array.from({length: SIZE}, () => new Array(SIZE).fill(0));
    }

    function placeShips(board) {
      for (const len of SHIPS) {
        let placed = false, tries = 0;
        while (!placed && tries++ < 10000) {
          const hor = Math.random() > 0.5;
          const r = Math.floor(Math.random() * (hor ? SIZE : SIZE - len + 1));
          const c = Math.floor(Math.random() * (hor ? SIZE - len + 1 : SIZE));
          if (r >= SIZE || c >= SIZE) continue;
          let ok = true;
          const cells = [];
          for (let i = 0; i < len; i++) {
            const rr = hor ? r : r + i, cc = hor ? c + i : c;
            if (rr >= SIZE || cc >= SIZE) { ok = false; break; }
            cells.push([rr, cc]);
            for (let dr = -1; dr <= 1; dr++)
              for (let dc = -1; dc <= 1; dc++) {
                const nr = rr+dr, nc = cc+dc;
                if (nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && board[nr][nc]===1) ok=false;
              }
            if (!ok) break;
          }
          if (ok) { cells.forEach(([rr,cc]) => board[rr][cc]=1); placed=true; }
        }
      }
    }

    function drawBoard(ctx, board, hide) {
      const s = CELL;
      ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const x = c*s, y = r*s, v = board[r][c];
          ctx.fillStyle = (r+c)%2===0 ? '#b3e5fc' : '#81d4fa';
          ctx.fillRect(x,y,s,s);
          if (v===1 && !hide) {
            ctx.fillStyle = '#37474f';
            ctx.fillRect(x+3, y+3, s-6, s-6);
          }
          if (v===2) {
            ctx.fillStyle = '#c62828';
            ctx.fillRect(x+3,y+3,s-6,s-6);
            ctx.strokeStyle='#fff'; ctx.lineWidth=2;
            ctx.beginPath();
            ctx.moveTo(x+6,y+6); ctx.lineTo(x+s-6,y+s-6);
            ctx.moveTo(x+s-6,y+6); ctx.lineTo(x+6,y+s-6);
            ctx.stroke();
          }
          if (v===3) {
            ctx.fillStyle='#111';
            ctx.beginPath();
            ctx.arc(x+s/2, y+s/2, s/4, 0, Math.PI*2);
            ctx.fill();
          }
          ctx.strokeStyle='#0277bd'; ctx.lineWidth=0.5;
          ctx.strokeRect(x,y,s,s);
        }
      }
    }

    function drawBoards() {
      if (!playerBoard) return;
      drawBoard(pCtx, playerBoard, false);
      drawBoard(eCtx, shots, true);
    }

    function startGame() {
      setCanvasSizes();
      playerBoard = makeBoard();
      enemyBoard  = makeBoard();
      shots       = makeBoard();
      placeShips(playerBoard);
      placeShips(enemyBoard);
      gameActive = true;
      statusEl.textContent = 'Твой ход — кликни по полю противника';
      drawBoards();
    }

    function getCell(e, canvas) {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      const col = Math.floor((cx - rect.left) * sx / CELL);
      const row = Math.floor((cy - rect.top)  * sy / CELL);
      if (row<0||row>=SIZE||col<0||col>=SIZE) return null;
      return {row, col};
    }

    // ====== ЖЕНСКИЙ ГОЛОС (Web Speech API) ======
    let voiceReady = false;
    let russianFemaleVoice = null;

    function initVoice() {
      if (voiceReady) return;
      const voices = speechSynthesis.getVoices();
      // Ищем русский женский голос
      russianFemaleVoice =
        voices.find(v => v.lang.startsWith('ru') && /female|woman|жен/i.test(v.name)) ||
        voices.find(v => v.lang.startsWith('ru') && /Google|Yandex|Microsoft/i.test(v.name) && !/male|муж/i.test(v.name)) ||
        voices.find(v => v.lang.startsWith('ru')) ||
        null;
      if (voices.length > 0) voiceReady = true;
    }

    // Голоса загружаются асинхронно в Chrome
    speechSynthesis.onvoiceschanged = initVoice;
    initVoice();

    function speak(text, delay = 0) {
      setTimeout(() => {
        if (!('speechSynthesis' in window)) return;
        initVoice();
        speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'ru-RU';
        utter.rate = 0.92;
        utter.pitch = 1.15;  // чуть выше — женский голос
        utter.volume = 1.0;
        if (russianFemaleVoice) utter.voice = russianFemaleVoice;
        speechSynthesis.speak(utter);
      }, delay);
    }

    // Проверка: потоплен ли корабль, которому принадлежит клетка (r, c)
    // Корабль — связная группа клеток со значением 1 или 2
    function isShipSunk(board, hitBoard, r, c) {
      // Найдём все клетки корабля flood-fill по горизонтали/вертикали
      const visited = new Set();
      const stack = [[r, c]];
      const ship = [];

      // Сначала найдём связные клетки корабля (значение 1 или 2 в оригинальной доске)
      while (stack.length) {
        const [cr, cc] = stack.pop();
        const key = cr * SIZE + cc;
        if (visited.has(key)) continue;
        visited.add(key);
        const v = board[cr][cc];
        if (v !== 1 && v !== 2) continue;
        ship.push([cr, cc]);
        for (const [dr, dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
          const nr = cr+dr, nc = cc+dc;
          if (nr>=0 && nr<SIZE && nc>=0 && nc<SIZE) stack.push([nr, nc]);
        }
      }
      // Потоплен, если все клетки корабля поражены (значение 2)
      return ship.length > 0 && ship.every(([sr, sc]) => board[sr][sc] === 2);
    }

    function playerShoot(e) {
      if (!gameActive) return;
      e.preventDefault();
      const cell = getCell(e, enemyCanvas);
      if (!cell) return;
      const {row, col} = cell;
      if (shots[row][col] !== 0) return;
      soundShoot();

      if (enemyBoard[row][col] === 1) {
        shots[row][col] = 2;
        enemyBoard[row][col] = 2;
        statusEl.textContent = 'Попадание!';
        soundHit();
        // Проверяем — потоплен ли корабль
        if (isShipSunk(enemyBoard, shots, row, col)) {
          speak('Потоплен корабль противника', 400);
        }
      } else {
        shots[row][col] = 3;
        statusEl.textContent = 'Мимо...';
        soundMiss();
      }
      drawBoards();

      if (enemyBoard.flat().every(v => v!==1)) {
        statusEl.textContent = 'ПОБЕДА! Все корабли потоплены!';
        soundVictory();
        speak('Выиграл игрок', 600);
        gameActive = false;
        return;
      }
      gameActive = false;
      setTimeout(computerMove, 700);
    }

    function computerMove() {
      let r, c, tries = 0;
      do {
        r = Math.floor(Math.random()*SIZE);
        c = Math.floor(Math.random()*SIZE);
      } while ((playerBoard[r][c]===2||playerBoard[r][c]===3) && tries++<500);

      if (playerBoard[r][c]===1) {
        playerBoard[r][c]=2;
        statusEl.textContent = `Компьютер попал в ${String.fromCharCode(65+c)}${r+1}!`;
        soundHit();
        if (isShipSunk(playerBoard, playerBoard, r, c)) {
          speak('Потоплен ваш корабль', 400);
        }
      } else {
        playerBoard[r][c]=3;
        statusEl.textContent = 'Компьютер промахнулся. Твой ход!';
        soundMiss();
      }
      drawBoards();

      if (playerBoard.flat().every(v => v!==1)) {
        statusEl.textContent = 'Поражение... Компьютер победил';
        soundDefeat();
        speak('Компьютер выиграл', 600);
        return;
      }
      gameActive = true;
    }

    enemyCanvas.addEventListener('click', playerShoot);
    enemyCanvas.addEventListener('touchstart', playerShoot, {passive: false});
    document.getElementById('newGame').addEventListener('click', () => { soundClick(); startGame(); });
    window.addEventListener('resize', () => { if(playerBoard){ setCanvasSizes(); drawBoards(); } });

    startGame();

    // ====== ЗВУК — электромеханический автомат "Морской бой" СССР ======
    // Float32 — полная 32-битная точность, никакого квантования
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) {
        // Явно указываем 32-bit float pipeline и максимальное sampleRate
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    // Полноточный Float32-буфер: заполнение через колбэк sample(i, sr) → float
    function makeBuf(ac, dur, fn) {
      const sr = ac.sampleRate;
      const len = Math.floor(sr * dur);
      const buf = ac.createBuffer(1, len, sr);
      const d = buf.getChannelData(0); // Float32Array — 32 бита на сэмпл
      for (let i = 0; i < len; i++) d[i] = fn(i, sr, len);
      return buf;
    }

    function playBuf(ac, buf, t, vol, filterType, filterFreq, filterQ = 1) {
      const src = ac.createBufferSource();
      src.buffer = buf;
      const g = ac.createGain();
      g.gain.setValueAtTime(vol, t);
      if (filterType) {
        const f = ac.createBiquadFilter();
        f.type = filterType;
        f.frequency.value = filterFreq;
        if (filterQ !== 1) f.Q.value = filterQ;
        src.connect(f); f.connect(g);
      } else {
        src.connect(g);
      }
      g.connect(ac.destination);
      src.start(t);
    }

    // Bandlimited прямоугольник через сумму гармоник (без алиасинга — 32-bit качество)
    function blSquare(phase, harmonics = 16) {
      let v = 0;
      for (let k = 0; k < harmonics; k++) {
        const n = 2 * k + 1;
        v += Math.sin(n * 2 * Math.PI * phase) / n;
      }
      return v * (4 / Math.PI);
    }

    // Плавная огибающая атака-сустейн-спад (float32, без ступенек)
    function env(progress, attack, release) {
      if (progress < attack) return progress / attack;
      if (progress > 1 - release) return (1 - progress) / release;
      return 1.0;
    }

    // Щелчок реле — короткий импульс с экспоненциальным спадом
    function relayClick(ac, t, vol = 0.5) {
      const buf = makeBuf(ac, 0.018, (i, sr, len) => {
        const p = i / len;
        // Импульс: резкий фронт, плавный экспоненциальный спад — без квантования
        const attack = p < 0.08 ? p / 0.08 : Math.exp(-18 * (p - 0.08));
        // Небольшой призвук металла (обертоны)
        const tone = Math.sin(2 * Math.PI * 1800 * i / sr) * 0.3
                   + Math.sin(2 * Math.PI * 3200 * i / sr) * 0.1;
        return attack * (0.7 + tone);
      });
      playBuf(ac, buf, t, vol, 'highpass', 400);
    }

    // Зуммер — bandlimited прямоугольник с wobble и плавной огибающей
    function buzzer(ac, t, dur, freq, vol) {
      const buf = makeBuf(ac, dur, (i, sr, len) => {
        const p = i / len;
        const phase = (i * freq / sr) % 1.0;
        // Bandlimited квадрат вместо жёсткого клиппинга
        const raw = blSquare(phase, 12);
        // Плавная модуляция — механическое дрожание (5.7 Гц)
        const wobble = 1.0 + 0.06 * Math.sin(2 * Math.PI * 5.7 * i / sr);
        // Огибающая с плавными краями
        const e = env(p, 0.015, 0.025);
        return raw * wobble * e * 0.9;
      });
      playBuf(ac, buf, t, vol, 'lowpass', 2400);
    }

    // ВЫСТРЕЛ торпеды
    function soundShoot() {
      const ac = getAudio();
      const t = ac.currentTime;
      relayClick(ac, t, 0.75);

      // Соленоид: низкий bandlimited удар с плавным спадом частоты
      const buf = makeBuf(ac, 0.18, (i, sr, len) => {
        const p = i / len;
        const freq = 62 * Math.exp(-2.5 * p); // 62→8 Гц плавно
        const phase = i * freq / sr % 1.0;
        const raw = blSquare(phase, 8);
        const e = p < 0.03 ? p / 0.03 : Math.exp(-5 * (p - 0.03));
        return raw * e;
      });
      playBuf(ac, buf, t + 0.012, 0.45, 'lowpass', 320);

      relayClick(ac, t + 0.10, 0.28);
    }

    // ПОПАДАНИЕ — взрыв-трещотка с падающей частотой
    function soundHit() {
      const ac = getAudio();
      const t = ac.currentTime;
      relayClick(ac, t, 1.0);

      // Трещотка: bandlimited прямоугольник, частота плавно падает 115→45 Гц
      const buf = makeBuf(ac, 0.95, (i, sr, len) => {
        const p = i / len;
        const freq = 115 * Math.exp(-Math.log(115 / 45) * p); // экспоненциальный спад
        const phase = i * freq / sr % 1.0;
        const raw = blSquare(phase, 10);
        // Плавная огибающая: быстрый атак, медленный release
        const e = p < 0.04
          ? p / 0.04
          : Math.pow(1 - (p - 0.04) / 0.96, 1.1);
        // Лёгкий шум поверх (механический хруст) — Float32, без квантования
        const noise = (Math.random() * 2 - 1) * 0.12 * e;
        return raw * e + noise;
      });
      playBuf(ac, buf, t + 0.006, 1.15, 'lowpass', 750);
      relayClick(ac, t + 0.93, 0.38);
    }

    // ПРОМАХ — тихий щелчок реле
    function soundMiss() {
      const ac = getAudio();
      const t = ac.currentTime;
      relayClick(ac, t, 0.32);
      buzzer(ac, t + 0.016, 0.038, 82, 0.10);
    }

    // ПОБЕДА — электрический звонок ДЗЗ-ДЗЗ-ДЗЗ + трель
    function soundVictory() {
      const ac = getAudio();
      const t = ac.currentTime;

      // Несущая 480 Гц, модулятор 8 Гц — полностью float32
      const buf = makeBuf(ac, 2.3, (i, sr, len) => {
        const sec = i / sr;
        const p = i / len;
        // Bandlimited несущая
        const carrier = blSquare((i * 480 / sr) % 1.0, 14);
        // Плавная амплитудная модуляция (механический прерыватель)
        const mod = Math.max(0.0, Math.sin(2 * Math.PI * 8.2 * sec));
        // Гейт: три удара + трель, плавные края через sigmoid
        const sigmoid = (x, k) => 1 / (1 + Math.exp(-k * x));
        let gate = 0;
        gate += sigmoid(sec - 0.0, 80) * sigmoid(0.18 - sec, 80);
        gate += sigmoid(sec - 0.28, 80) * sigmoid(0.46 - sec, 80);
        gate += sigmoid(sec - 0.56, 80) * sigmoid(0.74 - sec, 80);
        // Трель с плавным затуханием
        if (sec >= 0.90) {
          const tp = (sec - 0.90) / 1.4;
          gate += (1 - tp) * Math.max(0, 1 - tp);
        }
        gate = Math.min(gate, 1.0);
        return carrier * mod * gate;
      });
      playBuf(ac, buf, t, 0.88, 'bandpass', 520, 0.65);

      [0, 0.28, 0.56, 0.90].forEach(dt => relayClick(ac, t + dt, 0.48));
    }

    // ПОРАЖЕНИЕ — мотор останавливается (плавное падение частоты)
    function soundDefeat() {
      const ac = getAudio();
      const t = ac.currentTime;
      relayClick(ac, t, 0.6);

      const buf = makeBuf(ac, 1.5, (i, sr, len) => {
        const p = i / len;
        // Экспоненциальное падение частоты: 95 → 4 Гц
        const freq = 95 * Math.exp(-Math.log(95 / 4) * p);
        const phase = i * freq / sr % 1.0;
        const raw = blSquare(phase, Math.max(2, Math.floor(12 * (1 - p))));
        // Огибающая с плавным fade-out
        const e = Math.pow(1 - p, 0.65);
        return raw * e;
      });
      playBuf(ac, buf, t + 0.01, 0.68, 'lowpass', 580);
    }

    // НОВАЯ ИГРА — монета, два щелчка реле, зуммер готовности
    function soundClick() {
      const ac = getAudio();
      const t = ac.currentTime;
      relayClick(ac, t, 0.62);
      relayClick(ac, t + 0.075, 0.42);
      buzzer(ac, t + 0.13, 0.065, 195, 0.28);
    }
  </script>
</body>
</html>
